<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 68" width="300" height="68">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#0F3460"/>
    </linearGradient>
    <linearGradient id="armGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9922A"/>
      <stop offset="100%" stop-color="#E8B84B"/>
    </linearGradient>
  </defs>

  <!-- ── SHIELD MARK ── -->
  <!--
    Shield path: starts wide at top, narrows to a point at the bottom.
    Outer shield fill.
  -->
  <path d="M 34 2 L 62 10 L 62 38 Q 62 56 34 66 Q 6 56 6 38 L 6 10 Z"
        fill="url(#shieldGrad)"/>

  <!-- Inner shield highlight (subtle lighter edge) -->
  <path d="M 34 7 L 57 14 L 57 38 Q 57 53 34 62 Q 11 53 11 38 L 11 14 Z"
        fill="none" stroke="white" stroke-width="1" stroke-opacity="0.12"/>

  <!-- Bold, clear K — white — centred in shield -->
  <!-- Vertical stroke of K -->
  <line x1="26" y1="18" x2="26" y2="50"
        stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Upper arm -->
  <line x1="26" y1="34" x2="46" y2="18"
        stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Lower arm — gold accent to distinguish and add advisory feel -->
  <line x1="26" y1="34" x2="46" y2="50"
        stroke="url(#armGrad)" stroke-width="7" stroke-linecap="round"/>

  <!-- ── WORDMARK ── -->
  <text x="78" y="37"
        font-family="'Sora','Inter',system-ui,sans-serif"
        font-size="28" font-weight="700" letter-spacing="-0.8"
        fill="#0A2540">karman</text>

  <!-- Tagline with gold dot separator -->
  <circle cx="79" cy="52" r="2.5" fill="#C9922A"/>
  <text x="88" y="56"
        font-family="'Inter',system-ui,sans-serif"
        font-size="10.5" font-weight="600" letter-spacing="2.8"
        fill="#9AA5B4">CORPORATE SERVICES</text>
</svg>
