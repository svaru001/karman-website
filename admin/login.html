<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Karman</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F0F4F8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .login-logo img { height: 28px; }
    .login-logo__divider {
      width: 1px;
      height: 20px;
      background: #E2E8F0;
    }
    .login-logo__label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: #94A3B8;
    }
    .login-card h1 {
      font-family: 'Sora', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #0A2540;
      margin-bottom: 6px;
    }
    .login-card p {
      font-size: 14px;
      color: #64748B;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #E2E8F0;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      color: #0A2540;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 20px;
    }
    input[type="password"]:focus { border-color: #1a6bcc; }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: #0A2540;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-login:hover { background: #1a3a5c; }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }
    .error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #DC2626;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="/logo.svg" alt="Karman" />
        <div class="login-logo__divider"></div>
        <span class="login-logo__label">Admin</span>
      </div>
      <h1>Welcome back</h1>
      <p>Sign in to the Karman CRM dashboard.</p>
      <div class="error" id="error"></div>
      <form id="loginForm">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter admin password" autocomplete="current-password" required />
        <button type="submit" class="btn-login" id="submitBtn">Sign in</button>
      </form>
    </div>
  </div>
  <script>
    // Already logged in?
    if (localStorage.getItem('karman_admin_token')) {
      window.location.href = '/admin';
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('error');
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.style.display = 'none';

      try {
        const res = await fetch('/api/admin/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('karman_admin_token', data.token);
        window.location.href = '/admin';
      } catch(ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
