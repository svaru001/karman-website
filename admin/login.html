<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Karman</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #070E1F;
      background-image:
        radial-gradient(ellipse at 20% 60%, rgba(26, 107, 204, 0.22) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 201, 167, 0.10) 0%, transparent 45%),
        radial-gradient(ellipse at 65% 88%, rgba(124, 58, 237, 0.13) 0%, transparent 45%);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.055);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 44px 40px 40px;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .brand img {
      height: 24px;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }
    .brand__div { width: 1px; height: 18px; background: rgba(255,255,255,0.13); }
    .brand__pill {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      background: rgba(255,255,255,0.07);
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.025em;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.38);
      margin-bottom: 32px;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.28);
      color: #FCA5A5;
      font-size: 13px;
      padding: 11px 16px;
      border-radius: 10px;
      margin-bottom: 18px;
      display: none;
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.38);
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .field input {
      width: 100%;
      padding: 13px 42px 13px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      color: #fff;
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
      color-scheme: dark;
    }
    .field input::placeholder { color: rgba(255,255,255,0.22); }
    .field input:focus {
      border-color: rgba(26, 107, 204, 0.65);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(26,107,204,0.12);
    }
    .toggle-pw {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.28);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color .15s;
    }
    .toggle-pw:hover { color: rgba(255,255,255,0.65); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a6bcc 0%, #2563EB 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: .01em;
      transition: opacity .2s, box-shadow .2s, transform .1s;
      box-shadow: 0 8px 24px rgba(26, 107, 204, 0.42);
    }
    .btn-login:hover { opacity: .9; box-shadow: 0 12px 30px rgba(26, 107, 204, 0.52); }
    .btn-login:active { transform: scale(.99); }
    .btn-login:disabled { opacity: .48; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/logo.svg" alt="Karman" />
      <div class="brand__div"></div>
      <span class="brand__pill">Admin</span>
    </div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to the Karman CRM dashboard.</p>
    <div class="error" id="error"></div>
    <form id="loginForm">
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" id="togglePw" tabindex="-1" aria-label="Toggle password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="submitBtn">Sign in</button>
    </form>
  </div>
  <script>
    if (localStorage.getItem('karman_admin_token')) window.location.href = '/admin';

    document.getElementById('togglePw').addEventListener('click', function() {
      const inp = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        inp.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('error');
      const password = document.getElementById('password').value;
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.style.display = 'none';
      try {
        const res = await fetch('/api/admin/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('karman_admin_token', data.token);
        window.location.href = '/admin';
      } catch(ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
