<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 64">
  <!-- Outer shield (dark navy) -->
  <path d="M 2,2 L 54,2 L 54,40 Q 54,58 28,63 Q 2,58 2,40 Z" fill="#1B2F80"/>
  <!-- Inner shield (bright blue) -->
  <path d="M 9,8 L 47,8 L 47,39 Q 47,53 28,58 Q 9,53 9,39 Z" fill="#2F54CC"/>
  <!-- Cross of Lorraine — vertical bar -->
  <rect x="25.5" y="16" width="5" height="37" fill="white" rx="0.5"/>
  <!-- Upper (shorter) horizontal bar -->
  <rect x="18" y="22" width="20" height="5" fill="white" rx="0.5"/>
  <!-- Lower (longer) horizontal bar -->
  <rect x="13" y="33" width="30" height="5" fill="white" rx="0.5"/>
  <!-- KARMAN + ADVISORY on same baseline -->
  <text x="68" y="29" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="23">
    <tspan font-weight="800" fill="#1B2F80" letter-spacing="1">KARMAN</tspan><tspan font-weight="600" fill="#6B8CC4" letter-spacing="1" dx="5"> ADVISORY</tspan>
  </text>
  <!-- Tagline -->
  <text x="68" y="47" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="11" fill="#9AA5B4" letter-spacing="0.4">Corporate Compliance  ·  Legal  ·  Accounting</text>
</svg>
